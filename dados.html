<meta charset="UTF-8"/>
<script>
// Registar Service Worker — garante sempre ficheiros frescos do servidor
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
// Se catalogo.js falhou (ecrã preto) — detectar e forçar reload sem cache
window.addEventListener('load', function(){
  if(typeof LOJA_DEFAULT==='undefined'||typeof getLoja==='undefined'){
    // catalogo.js não carregou correctamente — limpar cache e recarregar
    if(!sessionStorage.getItem('_cf_reloaded')){
      sessionStorage.setItem('_cf_reloaded','1');
      if('caches' in window){
        caches.keys().then(function(keys){
          return Promise.all(keys.map(function(k){return caches.delete(k);}));
        }).then(function(){
          location.replace(location.pathname+'?_v='+Date.now());
        });
      } else {
        location.replace(location.pathname+'?_v='+Date.now());
      }
    } else {
      // Segunda tentativa falhou — NÃO remover o flag (evita loop infinito)
      // Marcar como 'failed' e mostrar erro visível ao utilizador
      sessionStorage.setItem('_cf_reloaded','failed');
      if(document.body&&!document.getElementById('_cf_load_err')){
        var d=document.createElement('div');
        d.id='_cf_load_err';
        d.style.cssText='position:fixed;inset:0;background:#0d0d1a;color:#ff6b9d;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;z-index:99999';
        d.innerHTML='<div style="font-size:2rem;margin-bottom:12px">⚠️</div><div style="font-size:1rem;font-weight:700;margin-bottom:8px">Erro ao carregar o site</div><div style="font-size:.8rem;opacity:.7;margin-bottom:20px">Verifique a sua ligação à internet e tente novamente.</div><button onclick="sessionStorage.clear();location.reload(true)" style="padding:10px 24px;background:#ff6b9d;border:none;border-radius:50px;color:#fff;font-size:.85rem;cursor:pointer">🔄 Tentar novamente</button>';
        document.body.appendChild(d);
      }
    }
  } else {
    sessionStorage.removeItem('_cf_reloaded');
  }
});
</script>

<script>(function(){
  try{
    var l=JSON.parse(localStorage.getItem('cf_loja')||'{}');
    var n=l.nome;
    if(n){
      // Aplicar imediatamente quando o elemento existir
      function _aplicarNome(){
        document.querySelectorAll('[data-loja-nome]').forEach(function(el){el.textContent=n;});
        var t=document.title;
        if(t&&t.indexOf('CONFETI')>=0)document.title=t.replace('CONFETI',n);
      }
      // Tentar imediatamente + no DOMContentLoaded como fallback
      document.addEventListener('DOMContentLoaded',_aplicarNome);
      // MutationObserver para apanhar elementos criados dinamicamente
      var obs=new MutationObserver(function(){
        var els=document.querySelectorAll('[data-loja-nome]');
        if(els.length){els.forEach(function(el){el.textContent=n;});}
      });
      obs.observe(document.documentElement,{childList:true,subtree:true});
      // Parar observer após carregar
      document.addEventListener('DOMContentLoaded',function(){obs.disconnect();});
    }
  }catch(_){}
})()</script>

<style>

}
[data-theme="light"]{
  --bg:#fff5f8;--bg2:#fff;--card:#fff;--border:#f0d6e8;

body{font-family:var(--fb);background:var(--bg);color:var(--white);min-height:100vh;overflow-x:hidden;padding-bottom:76px;transition:background .35s,color .35s}

.step-circle.active{background:var(--grad);color:#fff;box-shadow:0 0 12px rgba(255,107,157,.5)}
.step-circle.idle{background:var(--border);color:var(--muted2)}
.step-line{width:16px;height:2px;background:var(--border);flex-shrink:0}
.step-lbl{font-size:.55rem;font-weight:700;color:var(--muted);margin:0 2px;white-space:nowrap}

/* HERO */
.page-hdr{text-align:center;padding:10px 20px 14px;position:relative;z-index:1}
.page-logo{font-family:var(--ft);font-size:1.5rem;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}

/* FRASE */

/* FORM CARD */
.form-card{background:var(--card);border:1px solid var(--border);border-radius:22px;margin:0 16px;padding:20px 18px;position:relative;z-index:1;box-shadow:0 8px 40px rgba(0,0,0,.25);overflow:hidden}

/* FIELDS */
.fg{margin-bottom:12px;position:relative}
.fg label{display:block;font-size:.66rem;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}

.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ENTREGA OPTIONS */

/* THEME BTN */
.btn-theme{position:fixed;top:10px;right:14px;z-index:300;width:34px;height:34px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.9rem;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.3);transition:var(--tr);color:var(--white)}

/* BACK BTN */

/* NAV */
.nav-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;padding:6px 14px 10px;background:var(--bg);border-top:1px solid var(--border);display:flex;transition:background .35s}
[data-theme="light"] .nav-bar{background:var(--bg2)}
.btn-main{width:100%;height:44px;background:var(--grad);border:none;border-radius:50px;font-family:var(--ft);font-size:.9rem;color:#fff;cursor:pointer;transition:var(--tr);box-shadow:0 5px 20px rgba(255,107,157,.4);display:flex;align-items:center;justify-content:center;gap:8px}
.btn-main:hover{transform:translateY(-2px)}
.btn-main:active{transform:scale(.97)}

/* TOAST */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--card);border:1px solid var(--border);border-radius:16px;padding:10px 18px;font-size:.82rem;font-weight:700;white-space:normal;word-break:break-word;text-align:center;max-width:calc(100vw - 32px);width:max-content;z-index:9999;opacity:0;pointer-events:none;transition:transform .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto}
.toast.err{border-color:var(--red);color:var(--red)}
</style>
<script>
(function(){
  try{
    // Se catalogo.js carregou mas a versão no URL não bate certo com cf_versao → recarregar
    var scripts=document.querySelectorAll('script[src*="catalogo.js"]');
    if(!scripts.length) return;
    var src=scripts[0].getAttribute('src')||'';
    var urlV=parseInt((src.match(/\?v=(\d+)/)||[])[1]||0);
    var lojaV=typeof LOJA_DEFAULT!=='undefined'?(LOJA_DEFAULT.cf_versao||0):0;
    // Se versão do URL é diferente de cf_versao publicado → cache desactualizada → recarregar
    if(urlV>0&&lojaV>0&&urlV!==lojaV){
      var bust='?_v='+lojaV;
      if(location.search!==bust) window.location.replace(location.pathname+bust);
    }
  }catch(_){}
})();
</script>

<script src="catalogo.js?v=3"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    initTheme(); _syncThemeIcons(); applyThemeColors();
    const l = getLoja();
    document.getElementById('page-logo').textContent = l.nome;
    document.title = 'Os seus dados | ' + l.nome;

    if (l.logo) {
      const img = document.getElementById('logo-img');
      img.src = l.logo; img.style.display = 'block';
      document.getElementById('logo-ph').style.display = 'none';
    }
    if (l.fraseDia) {
      const f = document.getElementById('frase-dia');
      f.textContent = l.fraseDia; f.style.display = 'block';
    }
    if (!l.levantamentoActivo) document.getElementById('opt-l').style.display = 'none';
    if (!l.entregaActiva) document.getElementById('opt-e').style.display = 'none';

    // Pre-fill if data already exists
    const cli = JSON.parse(localStorage.getItem('cf_cliente') || 'null');
    if (cli) {
      if (cli.nome) document.getElementById('nome').value = cli.nome;
      if (cli.telefone) document.getElementById('telefone').value = cli.telefone;
      if (cli.provincia) document.getElementById('provincia').value = cli.provincia;
      if (cli.municipio) document.getElementById('municipio').value = cli.municipio;
      if (cli.bairro) document.getElementById('bairro').value = cli.bairro;
      if (cli.entrega) {
        const radio = document.querySelector(`input[name="ent"][value="${cli.entrega}"]`);
        if (radio) { radio.checked = true; selEnt(radio); }
      }
    }
  });

  function selEnt(r) {
    document.querySelectorAll('.eo').forEach(o => o.classList.remove('sel'));
    r.closest('.eo').classList.add('sel');
  }

  let _toastTimer = null;
  function toast(msg,tipo){clearTimeout(window._toastTimer);const t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.className='toast show '+(tipo||'err');window._toastTimer=window.setTimeout(function(){const e=document.getElementById('toast');if(e)e.classList.remove('show');},3200);}

  function avancar() {
    const nome     = document.getElementById('nome').value.trim();
    const telefone = document.getElementById('telefone').value.trim();
    const provincia = document.getElementById('provincia').value;
    const municipio = document.getElementById('municipio').value.trim();
    const bairro   = document.getElementById('bairro').value.trim();
    const entrega  = document.querySelector('input[name="ent"]:checked')?.value || 'entrega';

    if (!nome)      { toast('Indique o seu nome!'); return; }
    if (!telefone)  { toast('Indique o seu telemóvel!'); return; }
    const telefoneLimpo = telefone.replace(/\D/g, '');
    // Formato local: 9XXXXXXXX (exactamente 9 dígitos, começa em 9)
    // Formato internacional: 2449XXXXXXXX (exactamente 12 dígitos, 244 + 9XXXXXXXX)
    const telValido = /^9\d{8}$/.test(telefoneLimpo) || /^2449\d{8}$/.test(telefoneLimpo);
    if (!telValido) {
      toast('Número inválido — ex: 9XX XXX XXX'); return;
    }
    if (!provincia) { toast('Selecione a província!'); return; }
    if (!municipio) { toast('Indique o município!'); return; }
    if (!bairro)    { toast('Indique o bairro / rua!'); return; }

    // Guardar dados e limpar carrinho apenas se for cliente novo
    const existente = localStorage.getItem('cf_cliente');
    if (!existente) localStorage.removeItem('cf_carrinho');

    localStorage.setItem('cf_cliente', JSON.stringify({ nome, telefone, provincia, municipio, bairro, entrega }));
    window.location.href = 'catalogo.html';
  }
</script>
