name: Limpar deployments antigos

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      deployments: write

    steps:
      - name: Listar e limpar deployments inactivos
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            // 1. Listar todos os deployments (até 100)
            const { data: deployments } = await github.rest.repos.listDeployments({
              owner, repo, per_page: 100,
            });

            if (!deployments.length) {
              console.log('Nenhum deployment encontrado.');
              return;
            }

            console.log(`Total de deployments: ${deployments.length}`);

            // 2. Obter o estado de cada deployment
            const comEstado = await Promise.all(
              deployments.map(async (d) => {
                const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                  owner, repo, deployment_id: d.id, per_page: 1,
                });
                return { ...d, estado: statuses[0]?.state || 'unknown' };
              })
            );

            // 3. Ordenar do mais recente para o mais antigo
            comEstado.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            // 4. Manter os 3 mais recentes — apagar todo o resto independentemente do estado
            const MANTER = 3;
            const paraApagar = comEstado.slice(MANTER);

            console.log(`Manter: ${Math.min(MANTER, comEstado.length)} | Apagar: ${paraApagar.length}`);

            // 5. Inactivar e apagar
            let apagados = 0;
            for (const d of paraApagar) {
              try {
                await github.rest.repos.createDeploymentStatus({
                  owner, repo, deployment_id: d.id, state: 'inactive',
                });
                await github.rest.repos.deleteDeployment({
                  owner, repo, deployment_id: d.id,
                });
                apagados++;
                console.log(`✅ Apagado #${d.id} (${d.created_at}) [${d.estado}]`);
              } catch (err) {
                console.log(`⚠️  Não foi possível apagar #${d.id}: ${err.message}`);
              }
            }

            console.log(`Limpeza concluída. ${apagados} apagados.`);
