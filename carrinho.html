<!DOCTYPE html>
<html lang="pt-AO" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Carrinho | CONFETI</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml"/>
<script>(function(){var t=localStorage.getItem('cf_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})()</script>
<script>(function(){
  try{
    var l=JSON.parse(localStorage.getItem('cf_loja')||'{}');
    var n=l.nome;
    if(n){
      // Aplicar imediatamente quando o elemento existir
      function _aplicarNome(){
        document.querySelectorAll('[data-loja-nome]').forEach(function(el){el.textContent=n;});
        var t=document.title;
        if(t&&t.indexOf('CONFETI')>=0)document.title=t.replace('CONFETI',n);
      }
      // Tentar imediatamente + no DOMContentLoaded como fallback
      document.addEventListener('DOMContentLoaded',_aplicarNome);
      // MutationObserver para apanhar elementos criados dinamicamente
      var obs=new MutationObserver(function(){
        var els=document.querySelectorAll('[data-loja-nome]');
        if(els.length){els.forEach(function(el){el.textContent=n;});}
      });
      obs.observe(document.documentElement,{childList:true,subtree:true});
      // Parar observer ap횄혘횂혘횄혗횂혘횄혘횂혗횄혗횂쨀s carregar
      document.addEventListener('DOMContentLoaded',function(){obs.disconnect();});
    }
  }catch(_){}
})()</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0d0d1a;--bg2:#14142b;--card:#1a1a32;--border:#2a2a4a;--pink:#ff6b9d;--purple:#b14ae8;--teal:#06d6a0;--yellow:#ffd166;--coral:#ff9f43;--red:#ff4757;--white:#fff;--muted:#9898bb;--muted2:#4a4a6a;--ft:'Fredoka One',cursive;--fb:'Nunito',sans-serif;--r:14px;--tr:all .3s cubic-bezier(.4,0,.2,1);--grad:linear-gradient(135deg,#ff6b9d,#b14ae8)}
[data-theme="light"]{--bg:#fff5f8;--bg2:#fff;--card:#fff;--border:#f0d6e8;--white:#1a0a2e;--muted:#7a5a8a;--muted2:#ccc}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--bg);color:var(--white);min-height:100vh;padding-bottom:66px;transition:background .35s,color .35s}
.hdr{position:sticky;top:0;z-index:100;background:rgba(13,13,26,.97);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:11px 14px;display:flex;align-items:center;gap:10px;transition:background .35s}
[data-theme="light"] .hdr{background:rgba(255,245,248,.97)}
.btn-bk{width:34px;height:34px;border-radius:50%;background:none;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.9rem;cursor:pointer;color:var(--white);transition:var(--tr)}
.hdr-titulo{font-family:var(--ft);font-size:1rem;color:var(--white);flex:1;text-align:center}
.btn-th{width:32px;height:32px;border-radius:50%;background:none;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.85rem;cursor:pointer;color:var(--white)}
.pg-sub{font-size:.7rem;color:var(--muted);text-align:center;padding:4px 14px 2px}
.items{padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.item{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:12px;display:flex;gap:10px;align-items:center;position:relative;animation:sUp .28s ease both;transition:background .35s}
@keyframes sUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.item-img{width:60px;height:60px;border-radius:12px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:1.7rem;flex-shrink:0;overflow:hidden}
.item-img img{width:100%;height:100%;object-fit:cover}
.item-info{flex:1;min-width:0}
.item-nome{font-family:var(--ft);font-size:.86rem;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-unit{font-size:.68rem;color:var(--muted);margin-top:1px}
.item-nota{font-size:.64rem;color:var(--purple);margin-top:2px;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.item-sub{font-family:var(--ft);font-size:.88rem;color:var(--pink)}
.qty-row{display:flex;align-items:center;background:var(--bg2);border-radius:50px;border:1px solid var(--border);overflow:hidden}
.qb{width:34px;height:34px;border:none;background:transparent;color:var(--white);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .2s}
.qb:hover{color:var(--pink)}
.qn{min-width:26px;text-align:center;font-family:var(--ft);font-size:.88rem}
.btn-del{background:none;border:1px solid rgba(255,71,87,.3);border-radius:8px;color:var(--red);cursor:pointer;padding:3px 9px;font-family:var(--ft);font-size:.62rem;transition:var(--tr)}
.btn-del:hover{background:rgba(255,71,87,.1)}
.nota-box{margin:0 12px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:12px}
.nota-lbl{font-size:.6rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
.nota-ta{width:100%;background:transparent;border:none;outline:none;font-family:var(--fb);font-size:.84rem;color:var(--white);resize:none;min-height:48px;line-height:1.5}
.nota-ta::placeholder{color:var(--muted2)}
.resumo{margin:0 12px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;transition:background .35s}
.rrow{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:.82rem}
.rrow:last-child{border-bottom:none}
.rl{color:var(--muted)}.rv{font-weight:600}
.rtotal{display:flex;justify-content:space-between;align-items:center;padding-top:10px;margin-top:6px;border-top:2px solid var(--border)}
.rtl{font-family:var(--ft);font-size:.88rem}.rtv{font-family:var(--ft);font-size:1.3rem;color:var(--pink)}
.empty{padding:80px 20px;text-align:center;display:none}
.ce-ico{font-size:3.5rem;margin-bottom:12px;opacity:.25}
.empty h2{font-family:var(--ft);font-size:1.1rem;color:var(--muted);margin-bottom:8px}
.empty p{color:var(--muted2);font-size:.84rem;margin-bottom:20px}
.btn-cat{padding:13px 28px;background:var(--grad);border:none;border-radius:50px;font-family:var(--ft);font-size:.88rem;color:#fff;cursor:pointer;box-shadow:0 6px 18px rgba(255,107,157,.35);transition:var(--tr)}
.btn-cat:hover{transform:translateY(-2px)}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:200;padding:6px 12px 10px;display:flex;gap:8px;align-items:center;background:rgba(13,13,26,.97);backdrop-filter:blur(24px);border-top:1px solid var(--border);transition:background .35s}
[data-theme="light"] .nav{background:rgba(255,245,248,.97)}
.btn-bk-nav{width:40px;height:40px;flex-shrink:0;background:var(--bg2);border:1px solid var(--border);border-radius:50%;font-size:.9rem;cursor:pointer;color:var(--white);display:flex;align-items:center;justify-content:center}
.btn-conf{flex:1;height:40px;border:none;background:linear-gradient(135deg,var(--teal),#04b385);border-radius:50px;font-family:var(--ft);font-size:.78rem;color:#0d0d1a;cursor:pointer;transition:var(--tr);display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 4px 14px rgba(6,214,160,.3)}
.btn-conf:hover{filter:brightness(1.05)}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--card);border:1px solid var(--border);border-radius:16px;padding:10px 18px;font-size:.82rem;font-weight:700;white-space:normal;word-break:break-word;text-align:center;max-width:calc(100vw - 32px);width:max-content;z-index:9999;opacity:0;pointer-events:none;transition:transform .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto}
.toast.ok{border-color:var(--pink);color:var(--pink)}
.toast.err{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<header class="hdr">
  <button class="btn-bk" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
  <div class="hdr-titulo"><i class="fa-solid fa-cart-shopping" style="margin-right:6px"></i>Carrinho</div>
  <button class="btn-th" onclick="toggleTheme()"><i data-theme-ico class="fa-solid fa-sun"></i></button>
</header>
<div class="pg-sub" id="pg-sub"></div>
<div id="cart-content"></div>
<div class="nav" id="nav-b" style="display:none">
  <button class="btn-bk-nav" onclick="window.location.href='catalogo.html'"><i class="fa-solid fa-arrow-left"></i></button>
  <button class="btn-conf" onclick="confirmar()">Confirmar Encomenda 횄혘횂혘횄혗횂짖횄혘횂혗횄혗횂혵횄혘횂혗횄혗횂혚</button>
</div>
<div class="toast" id="toast"></div>
<script src="catalogo.js?v=10"></script>
<script>
  let _car;
  document.addEventListener('DOMContentLoaded',()=>{
    initTheme();_syncThemeIcons();applyThemeColors();
    _car=getCarrinho();render();
  });
  function render(){
    const el=document.getElementById('cart-content'),nav=document.getElementById('nav-b');
    if(!_car.length){
      nav.style.display='none';document.getElementById('pg-sub').textContent='';
      el.innerHTML=`<div class="empty"><div class="ce-ico"><i class="fa-solid fa-cart-shopping"></i></div><h2>Carrinho vazio</h2><p>Adicione produtos ao carrinho para continuar</p><button class="btn-cat" onclick="window.location.href='catalogo.html'">Ver Cat횄혘횂혘횄혗횂혘횄혘횂혗횄혗횂징logo 횄혘횂혘횄혗횂째횄혘횂혗횄혗횂혺횄혘횂혗횄혗횂혦횄혘횂혗횄혗횂혗</button></div>`;
      document.querySelector('.empty').style.display='block';return;
    }
    nav.style.display='flex';
    const total=_car.reduce((s,i)=>s+i.preco*i.quantidade,0);
    const qtd=_car.reduce((s,i)=>s+i.quantidade,0);
    document.getElementById('pg-sub').textContent=`${qtd} produto${qtd!==1?'s':''} 횄혘횂혘횄혗횂혗횄혘횂혗횄혗횂쨌 ${kz(total)}`;
    let html=`<div class="items">`;
    _car.forEach((item,idx)=>{
      const imgH=item.imagem?`<img src="${item.imagem}" alt="" loading="lazy" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`:item.emoji;
      html+=`<div class="item" style="animation-delay:${idx*.04}s">
        <div class="item-img">${imgH}</div>
        <div class="item-info">
          <div class="item-nome">${item.nome}</div>
          <div class="item-unit">${kz(item.preco)} / un.</div>
          ${item.nota?`<div class="item-nota">횄혘횂혘횄혗횂째횄혘횂혗횄혗횂혺횄혘횂혗횄혗횂혫횄혘횂혗횄혗횂혶 ${item.nota}</div>`:''}
        </div>
        <div class="item-right">
          <div class="item-sub">${kz(item.preco*item.quantidade)}</div>
          <button class="btn-del" onclick="rem(${idx})"><i class="fa-solid fa-trash"></i> Remover</button>
          <div class="qty-row"><button class="qb" onclick="adj(${idx},-1)">횄혘횂혘횄혗횂짖횄혘횂혗횄혗횂혞횄혘횂혗횄혗횂혪</button><span class="qn">${item.quantidade}</span><button class="qb" onclick="adj(${idx},1)">+</button></div>
        </div>
      </div>`;
    });
    html+=`</div>`;
    const nota=localStorage.getItem('cf_nota')||'';
    html+=`<div class="nota-box"><label class="nota-lbl">횄혘횂혘횄혗횂째횄혘횂혗횄혗횂혺횄혘횂혗횄혗횂혫횄혘횂혗횄혗횂혶 Nota geral da encomenda</label><textarea class="nota-ta" id="nota-ta" placeholder="Data do evento, tema geral, observa횄혘횂혘횄혗횂혘횄혘횂혗횄혗횂짠횄혘횂혘횄혗횂혘횄혘횂혗횄혗횂쨉es..." oninput="localStorage.setItem('cf_nota',this.value)">${nota}</textarea></div>`;
    html+=`<div class="resumo"><div class="rrow"><span class="rl">Produtos (${qtd})</span><span class="rv">${kz(total)}</span></div><div class="rrow"><span class="rl">Entrega</span><span class="rv" style="color:var(--teal)">A combinar</span></div><div class="rtotal"><span class="rtl">Total</span><span class="rtv">${kz(total)}</span></div></div>`;
    el.innerHTML=html;
  }
  function adj(i,d){_car[i].quantidade=Math.max(1,Math.min(99,_car[i].quantidade+d));salvarCarrinho(_car);render();}
  function rem(i){const n=_car[i].nome;_car.splice(i,1);salvarCarrinho(_car);toast(n+' removido','err');render();}
  function confirmar(){if(!_car.length){toast('Carrinho vazio!','err');return;}window.location.href='confirmacao.html';}
  function toast(msg,tipo){clearTimeout(window._toastTimer);const t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.className='toast show '+(tipo||'ok');window._toastTimer=window.setTimeout(function(){const e=document.getElementById('toast');if(e)e.classList.remove('show');},3200);}
</script>
</body>
</html>
