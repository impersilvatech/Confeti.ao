<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#b14ae8"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#ff9f43"/>
    </linearGradient>
  </defs>
  <!-- dark bg -->
  <rect width="64" height="64" rx="16" fill="#0d0d1a"/>
  <!-- cupcake base -->
  <path d="M20 40 Q16 36 18 32 L46 32 Q48 36 44 40 Z" fill="#ffd166"/>
  <!-- cupcake wrapper lines -->
  <line x1="24" y1="32" x2="22" y2="40" stroke="rgba(0,0,0,.2)" stroke-width="1.5"/>
  <line x1="32" y1="32" x2="32" y2="40" stroke="rgba(0,0,0,.2)" stroke-width="1.5"/>
  <line x1="40" y1="32" x2="42" y2="40" stroke="rgba(0,0,0,.2)" stroke-width="1.5"/>
  <!-- frosting -->
  <ellipse cx="32" cy="26" rx="14" ry="9" fill="url(#g1)"/>
  <ellipse cx="26" cy="20" rx="7" ry="6" fill="url(#g1)"/>
  <ellipse cx="38" cy="20" rx="7" ry="6" fill="url(#g1)"/>
  <ellipse cx="32" cy="16" rx="6" ry="5" fill="url(#g1)"/>
  <!-- highlight -->
  <ellipse cx="28" cy="18" rx="3" ry="2" fill="rgba(255,255,255,.2)"/>
  <!-- sprinkles -->
  <rect x="22" y="24" width="4" height="1.5" rx="1" fill="#ffd166" transform="rotate(-30 24 24.75)"/>
  <rect x="36" y="22" width="4" height="1.5" rx="1" fill="#06d6a0" transform="rotate(20 38 22.75)"/>
  <rect x="30" y="26" width="3.5" height="1.5" rx="1" fill="#fff" transform="rotate(10 31.75 26.75)"/>
  <rect x="40" y="27" width="3" height="1.5" rx="1" fill="#ffd166" transform="rotate(-15 41.5 27.75)"/>
  <!-- cherry on top -->
  <circle cx="32" cy="11" r="3" fill="#ff4757"/>
  <line x1="32" y1="11" x2="33" y2="14" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round"/>
</svg>
