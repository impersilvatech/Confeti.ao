<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>A carregar CONFETI...</title>
<style>
body{margin:0;background:#0d0d1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;color:#fff;text-align:center;padding:20px}
.logo{font-size:3rem;margin-bottom:16px}
p{color:#9898bb;font-size:.95rem;margin-bottom:28px;line-height:1.6}
.bar{width:220px;height:8px;background:#2a2a4a;border-radius:50px;overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,#ff6b9d,#b14ae8);border-radius:50px;width:0;transition:width .3s}
</style>
</head>
<body>
<div class="logo">🎊</div>
<p>A limpar cache e a carregar o CONFETI...</p>
<div class="bar"><div class="fill" id="bar"></div></div>
<script>
(async function(){
  const bar = document.getElementById('bar');
  bar.style.width = '20%';

  try {
    // Desregistar todos os Service Workers
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
    }
    bar.style.width = '50%';

    // Limpar todas as caches
    if ('caches' in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }
    bar.style.width = '90%';

    // Aguardar um momento e redirecionar
    await new Promise(r => setTimeout(r, 600));
    bar.style.width = '100%';
    await new Promise(r => setTimeout(r, 300));

    // Ir para o site com cache bust
    window.location.replace('/?_v=' + Date.now());

  } catch(e) {
    window.location.replace('/');
  }
})();
</script>
</body>
</html>
