name: Limpar deployments antigos

on:
  push:
    branches: [main]
  workflow_dispatch: # Permite correr manualmente se necessário

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      deployments: write

    steps:
      - name: Listar e limpar deployments inactivos
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            // 1. Listar todos os deployments
            const { data: deployments } = await github.rest.repos.listDeployments({
              owner,
              repo,
              per_page: 100,
            });

            if (deployments.length === 0) {
              console.log('Nenhum deployment encontrado.');
              return;
            }

            console.log(`Total de deployments: ${deployments.length}`);

            // 2. Para cada deployment, verificar o estado
            const comEstado = await Promise.all(
              deployments.map(async (d) => {
                const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                  owner,
                  repo,
                  deployment_id: d.id,
                  per_page: 1,
                });
                const estado = statuses[0]?.state || 'unknown';
                return { ...d, estado };
              })
            );

            // 3. Ordenar do mais recente para o mais antigo
            comEstado.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            // 4. Manter os 5 mais recentes — apagar o resto se estiver inactivo
            const MANTER = 5;
            const paraApagar = comEstado.slice(MANTER).filter(
              (d) => d.estado === 'inactive' || d.estado === 'unknown'
            );

            console.log(`Deployments a manter: ${Math.min(MANTER, comEstado.length)}`);
            console.log(`Deployments a apagar: ${paraApagar.length}`);

            // 5. Inactivar e apagar cada um
            for (const d of paraApagar) {
              try {
                // Primeiro inactivar (obrigatório antes de apagar)
                await github.rest.repos.createDeploymentStatus({
                  owner,
                  repo,
                  deployment_id: d.id,
                  state: 'inactive',
                });

                // Depois apagar
                await github.rest.repos.deleteDeployment({
                  owner,
                  repo,
                  deployment_id: d.id,
                });

                console.log(`✅ Apagado deployment #${d.id} (${d.created_at})`);
              } catch (err) {
                console.log(`⚠️  Não foi possível apagar #${d.id}: ${err.message}`);
              }
            }

            console.log('Limpeza concluída.');
